name: Deploy Main to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-repo
        continue-on-error: true

      # First-run: create an orphan gh-pages branch if it doesn't exist yet.
      - name: Initialize gh-pages branch if missing
        if: steps.checkout-gh-pages.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git clone "${REPO_URL}" gh-pages-tmp
          cd gh-pages-tmp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          mkdir -p pr-preview
          echo '# Genesis Archive' > index.html
          git add .
          git commit -m "Initialize gh-pages"
          git push "${REPO_URL}" HEAD:gh-pages
          cd ..
          rm -rf gh-pages-tmp
          git clone --branch gh-pages --single-branch "${REPO_URL}" gh-pages-repo

      - name: Update root with main archive (preserve PR previews)
        run: |
          cd gh-pages-repo

          # Wipe everything at the root except .git and pr-preview/ so that
          # deleted runs or renamed files don't linger across deploys.
          find . -maxdepth 1 -not -name '.' -not -name '..' \
            -not -name '.git' -not -name 'pr-preview' \
            -exec rm -rf {} +

          # Sync archive/ contents to the gh-pages root.  Relative links
          # inside index.html (e.g. runs/run-0001/dashboard.html) then work
          # at https://<owner>.github.io/<repo>/ without any path prefix.
          rsync -av --exclude='.git' ../main-repo/archive/ .

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy main site 🚀"
            git push origin gh-pages
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-repo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

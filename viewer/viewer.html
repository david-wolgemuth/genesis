<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a1a;
  color: #c0c0c0;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}
#canvas-container {
  position: absolute;
  inset: 0;
}
#overlay {
  position: fixed;
  top: 12px;
  left: 12px;
  background: rgba(5, 5, 20, 0.85);
  border: 1px solid #1a2a3a;
  padding: 10px 14px;
  min-width: 220px;
  font-size: 12px;
  line-height: 1.7;
  pointer-events: none;
  z-index: 10;
}
#overlay .label { color: #4a90d9; font-weight: bold; }
#overlay .value { color: #e0e0e0; }
#controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(5, 5, 20, 0.9);
  border-top: 1px solid #1a2a3a;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
  flex-wrap: wrap;
}
button {
  background: #0f1e2e;
  color: #4a90d9;
  border: 1px solid #2a4a6a;
  padding: 4px 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: background 0.1s;
}
button:hover { background: #1a2e40; }
button.active { background: #1a3a5a; color: #7ab8f0; }
#scrubber {
  flex: 1;
  min-width: 150px;
  max-width: 500px;
  accent-color: #4a90d9;
}
#speed { width: 80px; accent-color: #4a90d9; }
#tick-display { color: #888; font-size: 11px; min-width: 80px; }
#mode-display { color: #4ad94a; font-size: 11px; }
#annotation {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(5, 5, 30, 0.92);
  border: 1px solid #4a90d9;
  padding: 8px 16px;
  font-size: 12px;
  color: #c0d8f0;
  max-width: 500px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 10;
}
#annotation.visible { opacity: 1; }
#legend {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(5, 5, 20, 0.85);
  border: 1px solid #1a2a3a;
  padding: 10px 14px;
  font-size: 11px;
  line-height: 1.8;
  z-index: 10;
}
#legend .elem { display: flex; align-items: center; gap: 6px; }
#legend .swatch { width: 10px; height: 10px; border-radius: 2px; }
#loading {
  position: fixed;
  inset: 0;
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 16px;
}
#loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid #1a2a3a;
  border-top-color: #4a90d9;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg { color: #888; font-size: 13px; }
#error {
  position: fixed;
  inset: 0;
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 12px;
  display: none;
}
#error h2 { color: #d94a4a; }
#error p { color: #888; font-size: 13px; max-width: 400px; text-align: center; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Loading simulation data...</div>
</div>

<div id="error">
  <h2>Load Error</h2>
  <p id="error-msg">Could not load run data. Use ?run=run-NNNN in the URL to specify a run, or run from the archive index.</p>
</div>

<div id="canvas-container"></div>

<div id="overlay">
  <div><span class="label">Run</span> <span class="value" id="info-run">—</span></div>
  <div><span class="label">Seed</span> <span class="value" id="info-seed">—</span></div>
  <div><span class="label">Agents</span> <span class="value" id="info-agents">—</span></div>
  <div><span class="label">Free</span> <span class="value" id="info-free">—</span></div>
  <div><span class="label">Bonded</span> <span class="value" id="info-bonded">—</span></div>
  <div><span class="label">Bonds +/-</span> <span class="value" id="info-bonds">—</span></div>
</div>

<div id="legend"></div>

<div id="controls">
  <button id="btn-play">&#9654; Play</button>
  <button id="btn-camera">&#127909; Guided</button>
  <input type="range" id="scrubber" min="0" max="0" value="0">
  <span id="tick-display">tick: 0</span>
  <label style="font-size:11px; color:#888;">Speed
    <input type="range" id="speed" min="1" max="30" value="8">
  </label>
  <span id="mode-display">&#127909; Guided camera</span>
</div>

<div id="annotation"></div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// Genesis Viewer — Three.js terrain renderer
// Loads frame JSON data produced by the Rust engine and
// animates the simulation as a 3D heightmap.
// ============================================================

// ---- URL param parsing ----
function getParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

const runId = getParam('run') || 'run-0001';
// Viewer lives at viewer/viewer.html; archive at archive/runs/run-NNNN/
const runBase = `../archive/runs/${runId}`;

// ---- Global state ----
let manifest = null;
let frames = [];
let cameraScript = null;
let elementColors = {};
let currentFrameIdx = 0;
let playing = false;
let guidedCamera = true;
let playTimer = null;
let speedValue = 8;

// Three.js objects
let scene, camera, renderer, terrainMesh, orbitControls;
let terrainGeo, terrainMat;

// ============================================================
// Load data
// ============================================================
async function loadAll() {
  setLoading('Loading manifest...');
  try {
    manifest = await fetchJSON(`${runBase}/manifest.json`);
    elementColors = manifest.element_colors || {};
    buildLegend();
  } catch(e) {
    showError(`Could not load manifest for ${runId}: ${e.message}`);
    return;
  }

  setLoading(`Loading ${manifest.frames.length} frames...`);
  try {
    for (let i = 0; i < manifest.frames.length; i++) {
      if (i % 5 === 0) setLoading(`Loading frames ${i}/${manifest.frames.length}...`);
      const frame = await fetchJSON(`${runBase}/${manifest.frames[i]}`);
      frames.push(frame);
    }
  } catch(e) {
    showError(`Could not load frame data: ${e.message}`);
    return;
  }

  try {
    cameraScript = await fetchJSON(`${runBase}/camera.json`);
  } catch(e) {
    cameraScript = { keyframes: [] };
  }

  hideLoading();
  initThree();
  renderFrame(0);
  updateOverlay();
  document.getElementById('scrubber').max = frames.length - 1;
}

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${url}`);
  return resp.json();
}

// ============================================================
// Three.js setup
// ============================================================
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

  const container = document.getElementById('canvas-container');
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  // Camera
  const fov = 45;
  const aspect = window.innerWidth / window.innerHeight;
  camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 2000);
  camera.position.set(40, 60, 90);
  camera.lookAt(40, 0, 20);

  // Orbit controls (inline — no CDN module needed)
  setupOrbitControls(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0x334455, 1.2);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(100, 150, 50);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x2244aa, 0.4);
  fill.position.set(-50, 30, -50);
  scene.add(fill);

  // Build terrain geometry from first frame
  if (frames.length > 0) {
    buildTerrainMesh(frames[0]);
  }

  // Resize handler
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animate loop
  animate();
}

// ============================================================
// Simple orbit controls (no import needed)
// ============================================================
let isDragging = false;
let lastMouse = { x: 0, y: 0 };
let spherical = { theta: Math.PI / 4, phi: Math.PI / 4, radius: 100 };
let orbitTarget = new THREE.Vector3(40, 0, 20);

function setupOrbitControls(domElem) {
  domElem.addEventListener('mousedown', (e) => {
    isDragging = true;
    lastMouse = { x: e.clientX, y: e.clientY };
    guidedCamera = false;
    updateCameraMode();
  });
  domElem.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    lastMouse = { x: e.clientX, y: e.clientY };
    spherical.theta -= dx * 0.01;
    spherical.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, spherical.phi - dy * 0.01));
  });
  domElem.addEventListener('mouseup', () => { isDragging = false; });
  domElem.addEventListener('mouseleave', () => { isDragging = false; });
  domElem.addEventListener('wheel', (e) => {
    spherical.radius = Math.max(10, Math.min(300, spherical.radius + e.deltaY * 0.1));
    guidedCamera = false;
    updateCameraMode();
  });
}

function applySpherical() {
  const x = orbitTarget.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = orbitTarget.y + spherical.radius * Math.cos(spherical.phi);
  const z = orbitTarget.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x, y, z);
  camera.lookAt(orbitTarget);
}

function sphericalFromCamera(pos, target) {
  const dx = pos.x - target.x;
  const dy = pos.y - target.y;
  const dz = pos.z - target.z;
  spherical.radius = Math.sqrt(dx*dx + dy*dy + dz*dz);
  spherical.phi = Math.acos(dy / spherical.radius);
  spherical.theta = Math.atan2(dx, dz);
  orbitTarget.copy(target);
}

// ============================================================
// Terrain mesh
// ============================================================
function buildTerrainMesh(frame) {
  if (terrainMesh) {
    scene.remove(terrainMesh);
    terrainGeo.dispose();
  }

  const w = frame.grid.width;
  const h = frame.grid.height;
  const cells = frame.grid.cells;

  // Each cell → 2 triangles (quad)
  const positions = new Float32Array(w * h * 6 * 3);
  const colors = new Float32Array(w * h * 6 * 3);

  let vi = 0;
  const ELEV_SCALE = 0.04; // scale elevation to visible range

  for (let i = 0; i < cells.length; i++) {
    const cell = cells[i];
    const cx = cell.x;
    const cz = cell.y;
    const cy = cell.elevation * ELEV_SCALE;

    // Clamp corner heights — we use a flat quad per cell at cell elevation
    // (a true heightmap would interpolate between neighboring cells,
    //  but flat quads make cell boundaries visible which aids reading)
    const y0 = cy;

    // Quad: (cx,y0,cz), (cx+1,y0,cz), (cx+1,y0,cz+1), (cx,y0,cz+1)
    // Triangle 1: 0,1,2   Triangle 2: 0,2,3
    const verts = [
      cx,   y0, cz,
      cx+1, y0, cz,
      cx+1, y0, cz+1,
      cx,   y0, cz,
      cx+1, y0, cz+1,
      cx,   y0, cz+1,
    ];
    for (let v = 0; v < 6; v++) {
      positions[vi * 3]     = verts[v * 3];
      positions[vi * 3 + 1] = verts[v * 3 + 1];
      positions[vi * 3 + 2] = verts[v * 3 + 2];
      vi++;
    }
  }

  terrainGeo = new THREE.BufferGeometry();
  terrainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  terrainGeo.computeVertexNormals();

  terrainMat = new THREE.MeshLambertMaterial({
    vertexColors: true,
    side: THREE.FrontSide,
  });

  terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
  scene.add(terrainMesh);

  // Set up spherical from default camera position
  sphericalFromCamera(camera.position, orbitTarget);
}

// ============================================================
// Frame rendering — update vertex colors from frame data
// ============================================================
const HEX_CACHE = {};
function hexToRgb(hex) {
  if (HEX_CACHE[hex]) return HEX_CACHE[hex];
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  HEX_CACHE[hex] = [r, g, b];
  return [r, g, b];
}

// Default element color map (used if manifest doesn't provide colors)
const DEFAULT_COLORS = {
  alpha: '#4a90d9',
  beta: '#d94a4a',
  gamma: '#4ad94a',
  delta: '#d9d94a',
  epsilon: '#9a4ad9',
};

function cellColor(cell) {
  if (cell.agent_count === 0) {
    // Empty cell: color by terrain type
    const e = cell.elevation;
    if (e < -100) return [0.04, 0.07, 0.16]; // deep ocean
    if (e < -30)  return [0.06, 0.13, 0.25]; // ocean
    if (e < 0)    return [0.10, 0.19, 0.31]; // shallows
    if (e < 30)   return [0.16, 0.19, 0.12]; // coast
    return [0.23, 0.25, 0.19]; // highland
  }

  // Cell has agents: blend element color with activity brightness
  const domElem = cell.dominant_element;
  const elemColor = domElem
    ? (elementColors[domElem] || DEFAULT_COLORS[domElem] || '#4a90d9')
    : '#4a90d9';

  let [r, g, b] = hexToRgb(elemColor);

  // Activity boost: high activity = brighter
  const activity = cell.activity;
  const boost = 0.4 + activity * 0.8;
  r = Math.min(1, r * boost);
  g = Math.min(1, g * boost);
  b = Math.min(1, b * boost);

  // Bonded agents add a white glow
  if (cell.bonded_count > 0) {
    const glow = Math.min(0.4, cell.bonded_count / cell.agent_count * 0.5);
    r = Math.min(1, r + glow);
    g = Math.min(1, g + glow);
    b = Math.min(1, b + glow);
  }

  return [r, g, b];
}

function renderFrame(idx) {
  currentFrameIdx = idx;
  const frame = frames[idx];
  if (!frame || !terrainGeo) return;

  const colAttr = terrainGeo.getAttribute('color');
  const cols = colAttr.array;
  const posAttr = terrainGeo.getAttribute('position');
  const pos = posAttr.array;
  const cells = frame.grid.cells;
  const ELEV_SCALE = 0.04;

  for (let i = 0; i < cells.length; i++) {
    const cell = cells[i];
    const [r, g, b] = cellColor(cell);
    const cy = cell.elevation * ELEV_SCALE;

    // Update y-position for all 6 vertices of this cell's quad
    for (let v = 0; v < 6; v++) {
      const vi = i * 6 + v;
      pos[vi * 3 + 1] = cy;
      cols[vi * 3]     = r;
      cols[vi * 3 + 1] = g;
      cols[vi * 3 + 2] = b;
    }
  }

  colAttr.needsUpdate = true;
  posAttr.needsUpdate = true;
  terrainGeo.computeVertexNormals();

  updateOverlay(frame);
  document.getElementById('scrubber').value = idx;
  document.getElementById('tick-display').textContent = `tick: ${frame.tick}`;

  // Camera script: if guided, apply keyframe
  if (guidedCamera && cameraScript && cameraScript.keyframes.length > 0) {
    applyGuidedCamera(idx);
  } else if (!isDragging) {
    applySpherical();
  }
}

function applyGuidedCamera(frameIdx) {
  const kfs = cameraScript.keyframes;
  if (kfs.length === 0) return;

  // Find surrounding keyframes
  let before = kfs[0], after = kfs[kfs.length - 1];
  for (let i = 0; i < kfs.length - 1; i++) {
    if (kfs[i].frame <= frameIdx && kfs[i+1].frame >= frameIdx) {
      before = kfs[i];
      after = kfs[i+1];
      break;
    }
  }

  // Interpolate
  let t = 0;
  if (after.frame !== before.frame) {
    t = Math.max(0, Math.min(1, (frameIdx - before.frame) / (after.frame - before.frame)));
  }
  const lerp = (a, b) => a + (b - a) * t;

  const camPos = new THREE.Vector3(
    lerp(before.camera[0], after.camera[0]),
    lerp(before.camera[1], after.camera[1]),
    lerp(before.camera[2], after.camera[2])
  );
  const tgtPos = new THREE.Vector3(
    lerp(before.target[0], after.target[0]),
    lerp(before.target[1], after.target[1]),
    lerp(before.target[2], after.target[2])
  );

  camera.position.copy(camPos);
  camera.lookAt(tgtPos);
  orbitTarget.copy(tgtPos);
  sphericalFromCamera(camPos, tgtPos);

  // Show annotation at keyframe transitions
  const annotation = document.getElementById('annotation');
  if (before.frame === frameIdx || after.frame === frameIdx) {
    const note = before.frame === frameIdx ? before.note : after.note;
    annotation.textContent = note;
    annotation.classList.add('visible');
    clearTimeout(annotation._timer);
    annotation._timer = setTimeout(() => annotation.classList.remove('visible'), 4000);
  }
}

// ============================================================
// Overlay update
// ============================================================
function updateOverlay(frame) {
  if (manifest) {
    document.getElementById('info-run').textContent = manifest.run;
    document.getElementById('info-seed').textContent = manifest.seed;
  }
  if (frame && frame.stats) {
    const s = frame.stats;
    document.getElementById('info-agents').textContent = s.total_agents.toLocaleString();
    document.getElementById('info-free').textContent = s.free.toLocaleString();
    document.getElementById('info-bonded').textContent = s.bonded.toLocaleString();
    document.getElementById('info-bonds').textContent =
      `+${s.bonds_formed_this_tick} / -${s.bonds_broken_this_tick}`;
  }
}

// ============================================================
// Legend
// ============================================================
function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '<div style="color:#4a90d9;margin-bottom:4px">Elements</div>';
  const colors = { ...DEFAULT_COLORS, ...elementColors };
  for (const [name, color] of Object.entries(colors)) {
    legend.innerHTML += `
      <div class="elem">
        <div class="swatch" style="background:${color}"></div>
        <span>${name}</span>
      </div>`;
  }
  legend.innerHTML += `
    <div style="margin-top:8px; color:#666; font-size:10px">
      Drag to orbit &middot; Scroll to zoom
    </div>`;
}

// ============================================================
// Playback
// ============================================================
function setPlaying(val) {
  playing = val;
  document.getElementById('btn-play').innerHTML = playing ? '&#9646;&#9646; Pause' : '&#9654; Play';
  if (playing) {
    scheduleNextFrame();
  } else {
    clearTimeout(playTimer);
  }
}

function scheduleNextFrame() {
  if (!playing) return;
  const fps = parseInt(document.getElementById('speed').value);
  playTimer = setTimeout(() => {
    if (currentFrameIdx < frames.length - 1) {
      renderFrame(currentFrameIdx + 1);
      scheduleNextFrame();
    } else {
      setPlaying(false);
    }
  }, 1000 / fps);
}

function updateCameraMode() {
  const btn = document.getElementById('btn-camera');
  const mode = document.getElementById('mode-display');
  if (guidedCamera) {
    btn.classList.add('active');
    mode.textContent = '🎬 Guided camera';
    mode.style.color = '#4a90d9';
  } else {
    btn.classList.remove('active');
    mode.textContent = '🖱 Free camera';
    mode.style.color = '#888';
  }
}

// ============================================================
// Main animate loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  if (!isDragging && !guidedCamera) {
    applySpherical();
  }
  renderer.render(scene, camera);
}

// ============================================================
// Controls wiring
// ============================================================
document.getElementById('btn-play').addEventListener('click', () => {
  if (currentFrameIdx >= frames.length - 1) renderFrame(0);
  setPlaying(!playing);
});

document.getElementById('btn-camera').addEventListener('click', () => {
  guidedCamera = !guidedCamera;
  updateCameraMode();
  if (guidedCamera) {
    applyGuidedCamera(currentFrameIdx);
  }
});

document.getElementById('scrubber').addEventListener('input', (e) => {
  setPlaying(false);
  renderFrame(parseInt(e.target.value));
});

document.getElementById('speed').addEventListener('input', (e) => {
  speedValue = parseInt(e.target.value);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (currentFrameIdx >= frames.length - 1) renderFrame(0);
    setPlaying(!playing);
  }
  if (e.code === 'ArrowRight') { setPlaying(false); renderFrame(Math.min(frames.length - 1, currentFrameIdx + 1)); }
  if (e.code === 'ArrowLeft')  { setPlaying(false); renderFrame(Math.max(0, currentFrameIdx - 1)); }
  if (e.code === 'KeyG') { guidedCamera = !guidedCamera; updateCameraMode(); }
});

// ============================================================
// Loading UI
// ============================================================
function setLoading(msg) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-msg').textContent = msg;
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}
function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

// ============================================================
// Init
// ============================================================
updateCameraMode();
loadAll();
</script>
</body>
</html>

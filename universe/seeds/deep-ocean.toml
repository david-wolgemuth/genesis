# Deep Ocean Seed
# A uniform deep trench with high pressure and geothermal energy.
# Low UV (water attenuates star energy), high pressure.
# Tests whether pressure-dependent bonds (alpha-alpha, beta-beta) form preferentially.

name = "Deep Ocean"
description = "Uniform deep trench — high pressure, low UV, geothermal-driven chemistry"

[terrain]
type = "gradient"
left_depth = -400.0            # very deep everywhere
right_depth = -300.0           # still deep on the right
roughness = 0.15               # gentle undulation

[initial_agents]
alpha = 1500
beta = 1000
gamma = 200
delta = 500
epsilon = 300

[placement]
strategy = "uniform"           # evenly spread — no shallow bias

# Genesis Element Definitions
# The nouns of this universe. The bonding engine reads this.
# Shapes are abstract — think puzzle-piece slots, not molecular geometry.
# Four bonding slots per element: [N, E, S, W]. 1 = open, 0 = closed.

[[element]]
name = "alpha"
symbol = "α"
mass = 1.0
charge = 1
shape = [1, 0, 1, 0]
color = "#4a90d9"

[[element]]
name = "beta"
symbol = "β"
mass = 2.5
charge = -1
shape = [0, 1, 0, 1]
color = "#d94a4a"

[[element]]
name = "gamma"
symbol = "γ"
mass = 4.0
charge = 0
shape = [1, 1, 0, 0]
color = "#4ad94a"

[[element]]
name = "delta"
symbol = "δ"
mass = 6.0
charge = 2
shape = [1, 1, 1, 0]
color = "#d9d94a"

[[element]]
name = "epsilon"
symbol = "ε"
mass = 3.0
charge = -2
shape = [0, 1, 1, 1]
color = "#9a4ad9"

# Bond rules — define which element pairs can bond and under what conditions
# energy_released > 0 means exothermic (spontaneous if shape-compatible)
# energy_required > 0 means endothermic (needs energy input)

[[bond_rule]]
pair = ["alpha", "beta"]
energy_released = 2.0
stability_max_temp = 500.0
stability_min_pressure = 0.0

[[bond_rule]]
pair = ["alpha", "alpha"]
energy_required = 5.0
stability_max_temp = 300.0
stability_min_pressure = 2.0

[[bond_rule]]
pair = ["beta", "beta"]
energy_required = 3.0
stability_max_temp = 400.0
stability_min_pressure = 1.0

[[bond_rule]]
pair = ["gamma", "delta"]
energy_released = 4.0
stability_max_temp = 600.0
stability_min_pressure = 0.5

[[bond_rule]]
pair = ["alpha", "gamma"]
energy_released = 1.5
stability_max_temp = 450.0
stability_min_pressure = 0.0

[[bond_rule]]
pair = ["beta", "epsilon"]
energy_released = 3.0
stability_max_temp = 550.0
stability_min_pressure = 0.0

[[bond_rule]]
pair = ["delta", "epsilon"]
energy_released = 5.0
stability_max_temp = 700.0
stability_min_pressure = 1.0

[[bond_rule]]
pair = ["gamma", "epsilon"]
energy_required = 2.0
stability_max_temp = 350.0
stability_min_pressure = 3.0

# Catalysis rules — presence of catalyst near a reacting pair multiplies bond rate

[[catalysis_rule]]
catalyst = "gamma"
reaction = ["alpha", "beta"]
rate_multiplier = 2.0

[[catalysis_rule]]
catalyst = "epsilon"
reaction = ["gamma", "delta"]
rate_multiplier = 3.0
